name: webscreencapture

services:
  signal:
    image: webscreencapture-signal:2.0.3
    build:
      context: ../server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "127.0.0.1:18091:8080"
    mem_limit: 64m
    cpus: 0.50
    pids_limit: 64
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "/signal", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  coturn:
    image: coturn/coturn:4.12.0
    restart: unless-stopped
    network_mode: host
    command:
      - -c
      - /etc/coturn/turnserver.conf
      - --static-auth-secret=${TURN_SHARED_SECRET}
    volumes:
      - ./turnserver.conf:/etc/coturn/turnserver.conf:ro
      - ./tls:/certs:ro
    mem_limit: 64m
    cpus: 0.50
    pids_limit: 64
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:v5.0.0
    profiles: ["cert"]
    volumes:
      - ./certbot-data:/etc/letsencrypt
      - ./acme-webroot:/var/www/certbot
