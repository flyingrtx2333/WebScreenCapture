server {
    listen 80;
    listen [::]:80;
    server_name screen.flyingrtx.com;

    location ^~ /.well-known/acme-challenge/ {
        root /opt/webscreencapture/deploy/acme-webroot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name screen.flyingrtx.com;

    ssl_certificate /opt/webscreencapture/deploy/tls/fullchain.pem;
    ssl_certificate_key /opt/webscreencapture/deploy/tls/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:ScreenCaptureSSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 256k;

    location = /download/WebScreenCapture.exe {
        alias /opt/webscreencapture/releases/WebScreenCapture.exe;
        default_type application/vnd.microsoft.portable-executable;
        add_header Content-Disposition 'attachment; filename="WebScreenCapture-2.0.1.exe"' always;
        add_header Cache-Control 'no-store' always;
    }

    location /ws {
        proxy_pass http://127.0.0.1:18091;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 75s;
        proxy_send_timeout 15s;
    }

    location / {
        proxy_pass http://127.0.0.1:18091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
